name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1 -- Code Quality (Prettier & Global Linting)
  # ============================================================
  code_quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Global Formatters
        run: npm install -g prettier prettier-plugin-solidity

      - name: Run Global Prettier Check
        shell: bash
        run: |
          set -euo pipefail
          NODE_GLOBAL=$(npm root -g)
          echo "=== Running Prettier check across entire repo ==="
          prettier --plugin="$NODE_GLOBAL/prettier-plugin-solidity/dist/index.js" \
            --check "**/*.{js,jsx,ts,tsx,json,html,css,md,sol,yml,yaml}"

      - name: Finalize Check
        run: echo "All formatting checks completed successfully."

  # ============================================================
  # Job 2 -- Backend Tests
  # ============================================================
  backend_tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: code_quality

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test --if-present

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          if-no-files-found: ignore

  # ============================================================
  # Job 3 -- Web Build
  # ============================================================
  web_build:
    name: Web Build
    runs-on: ubuntu-latest
    needs: code_quality

    defaults:
      run:
        working-directory: web-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web-frontend/dist/
          retention-days: 7
