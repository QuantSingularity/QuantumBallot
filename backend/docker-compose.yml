version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: quantumballot-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - SECRET_KEY_IDENTIFIER=${SECRET_KEY_IDENTIFIER}
      - SECRET_IV_IDENTIFIER=${SECRET_IV_IDENTIFIER}
      - SECRET_KEY_VOTES=${SECRET_KEY_VOTES}
      - SECRET_IV_VOTES=${SECRET_IV_VOTES}
      - MAILER_SERVICE=${MAILER_SERVICE:-gmail}
      - MAILER_HOST=${MAILER_HOST:-smtp.gmail.com}
      - MAILER_PORT=${MAILER_PORT:-587}
      - MAILER_USER=${MAILER_USER}
      - MAILER_PASS=${MAILER_PASS}
      - DB_PATH=/app/data/QuantumBallot_db
    volumes:
      - quantumballot_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - quantumballot_net

  backend_dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: quantumballot-backend-dev
    restart: unless-stopped
    ports:
      - "${DEV_PORT:-3001}:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - ACCESS_TOKEN_SECRET=${ACCESS_TOKEN_SECRET}
      - REFRESH_TOKEN_SECRET=${REFRESH_TOKEN_SECRET}
      - SECRET_KEY_IDENTIFIER=${SECRET_KEY_IDENTIFIER}
      - SECRET_IV_IDENTIFIER=${SECRET_IV_IDENTIFIER}
      - SECRET_KEY_VOTES=${SECRET_KEY_VOTES}
      - SECRET_IV_VOTES=${SECRET_IV_VOTES}
      - MAILER_SERVICE=${MAILER_SERVICE:-gmail}
      - MAILER_HOST=${MAILER_HOST:-smtp.gmail.com}
      - MAILER_PORT=${MAILER_PORT:-587}
      - MAILER_USER=${MAILER_USER}
      - MAILER_PASS=${MAILER_PASS}
      - DB_PATH=/app/data/QuantumBallot_db
    volumes:
      - quantumballot_dev_data:/app/data
      - ./src:/app/src:ro
    command: ["npx", "ts-node", "src/index.ts"]
    networks:
      - quantumballot_net
    profiles:
      - dev

volumes:
  quantumballot_data:
    driver: local
  quantumballot_dev_data:
    driver: local

networks:
  quantumballot_net:
    driver: bridge
