---
# Tasks for the common role

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Install common packages
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - software-properties-common
      - python3-pip
      - virtualenv
      - python3-setuptools
      - git
      - unzip
      - jq
    state: present
  become: yes

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"
  become: yes

# --- Docker Installation --- #
- name: Create Docker keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: yes

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false
  become: yes

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker
  become: yes

- name: Install Docker Engine
  ansible.builtin.apt:
    name:
      - "docker-ce={{ docker_version }}*"
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes
  become: yes
  notify: Restart docker

- name: Ensure Docker service is started and enabled
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes
  become: yes

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
  become: yes

# --- Node.js Installation --- #
- name: Create NodeSource keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: yes

- name: Download NodeSource GPG key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"
    force: false
  become: yes

- name: Add NodeSource repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/nodesource.asc]
      https://deb.nodesource.com/node_{{ node_version }}
      nodistro main
    state: present
    filename: nodesource
    update_cache: yes
  become: yes

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
  become: yes

# --- Swap File (Optional) --- #
- name: Check if swap file exists
  ansible.builtin.stat:
    path: /swapfile
  register: swap_file_check
  when: create_swap | bool

- name: Create swap file
  ansible.builtin.command:
    cmd: fallocate -l {{ swap_size_mb }}M /swapfile
    creates: /swapfile
  become: yes
  when:
    - create_swap | bool
    - not swap_file_check.stat.exists

- name: Set swap file permissions
  ansible.builtin.file:
    path: /swapfile
    mode: "0600"
  become: yes
  when:
    - create_swap | bool
    - not swap_file_check.stat.exists

- name: Make swap file
  ansible.builtin.command:
    cmd: mkswap /swapfile
    creates: /proc/swaps
  become: yes
  when:
    - create_swap | bool
    - not swap_file_check.stat.exists

- name: Enable swap file
  ansible.builtin.command:
    cmd: swapon /swapfile
  become: yes
  when:
    - create_swap | bool
    - not swap_file_check.stat.exists
  changed_when: true

- name: Add swap file to /etc/fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: /swapfile none swap sw 0 0
    create: yes
  become: yes
  when:
    - create_swap | bool
    - not swap_file_check.stat.exists
